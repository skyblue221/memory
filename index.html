<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6aadcf" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>기억수집함</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="app-icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="app-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- 헤더 -->
    <header id="appHeader">
      <p id="headerDate" class="header-sub"></p>
      <p class="header-title">기억수집함</p>
    </header>

    <!-- 본문 -->
    <main id="appMain">
      <section id="view-home" class="view active"></section>
      <section id="view-shelf" class="view"></section>
      <section id="view-memories" class="view"></section>
      <section id="view-recall" class="view"></section>
    </main>

    <!-- 하단 탭바 -->
    <nav id="appNav">
      <button class="nav-btn active" data-tab="home"><span class="nav-icon">🏠</span><span class="nav-label">홈</span></button>
      <button class="nav-btn" data-tab="shelf"><span class="nav-icon">📚</span><span class="nav-label">서가</span></button>
      <button id="addBtn" class="nav-add">＋</button>
      <button class="nav-btn" data-tab="memories"><span class="nav-icon">📷</span><span class="nav-label">기억</span></button>
      <button class="nav-btn" data-tab="recall"><span class="nav-icon">↺</span><span class="nav-label">회상</span></button>
    </nav>
  </div>

  <!-- 상세 오버레이 -->
  <div id="detailOverlay" class="overlay hidden">
    <div id="detailModal" class="detail-modal"></div>
  </div>

  <!-- 바텀 시트 -->
  <div id="sheetOverlay" class="overlay hidden">
    <div id="bottomSheet" class="bottom-sheet">
      <div class="sheet-handle"></div>
      <div id="sheetContent"></div>
    </div>
  </div>

  <template id="emptyTpl">
    <div class="empty-state">아직 담긴 기억이 없어요.</div>
  </template>

  <script src="app.js?v=20260620-2"></script>
</body>
</html>
